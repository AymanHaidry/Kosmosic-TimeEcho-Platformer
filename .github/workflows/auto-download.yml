name: Auto Download Artifact

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: timeecho-apk
          path: downloaded
          
      - name: 📂 Show files
        run: |
          echo "Downloaded files:"
          ls -R downloaded
